<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#c0392b" />
    <meta name="description" content="Sistema de Gestión — Libreria Madrid" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Libreria Madrid" />

    <link rel="manifest" href="/manifest.json" />
    <link rel="apple-touch-icon" href="/icon-180.png" />
    <link rel="icon" type="image/png" sizes="192x192" href="/icon-192.png" />
    <link rel="icon" type="image/png" sizes="512x512" href="/icon-512.png" />

    <title>Libreria Madrid</title>

    <!-- OneSignal SDK v16 -->
    <script src="https://cdn.onesignal.com/sdks/web/v16/OneSignalSDK.page.js" defer></script>
    <script>
      window.OneSignalDeferred = window.OneSignalDeferred || [];
      OneSignalDeferred.push(async function(OneSignal) {
        await OneSignal.init({
          appId: "00dbe0c1-e7bf-4f80-885c-1680381ed121",
          serviceWorkerPath: "/OneSignalSDKWorker.js",
          notifyButton: { enable: false },
          allowLocalhostAsSecureOrigin: true,
        });
        // Exponer la instancia globalmente para que App.jsx pueda usarla
        window.OneSignal = OneSignal;
        window._oneSignalReady = true;
        // Disparar evento para que la app sepa que está listo
        window.dispatchEvent(new Event("oneSignalReady"));
      });
    </script>

    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', function() {
          navigator.serviceWorker.register('/service-worker.js')
            .then(function(reg) { console.log('SW registered'); })
            .catch(function(err) { console.log('SW error:', err); });
        });
      }
    </script>
  </head>
  <body>
    <noscript>Necesitás JavaScript para usar esta app.</noscript>
    <div id="root"></div>
  </body>
</html>
